# nginx reverse proxy for rehab.mzhang.dev
# Cloudflared tunnel → localhost:12377 (this nginx)
# /api/* → FastAPI backend at localhost:12302
# /*     → Frontend at localhost:12315

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 12377;
        server_name rehab.mzhang.dev _;

        # ── Backend API ──────────────────────────────────────────────────────
        # Strips /api prefix before forwarding to FastAPI
        location /api/ {
            proxy_pass         http://127.0.0.1:12302/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Authorization     $http_authorization;

            # Disable buffering for MJPEG /video_feed stream
            proxy_buffering            off;
            proxy_cache                off;
            proxy_read_timeout         300s;
            proxy_send_timeout         300s;
            chunked_transfer_encoding  on;
        }

        # ── Frontend ─────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://127.0.0.1:12315/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket support (Expo hot-reload / Metro bundler)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }
    }
}
